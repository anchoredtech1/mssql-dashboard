name: Build Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  build-windows:
    needs: build-frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package.json

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Install Electron deps
        run: cd electron && npm ci

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd electron && npm run build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            electron/dist/*.exe
            electron/dist/*.msi
          retention-days: 7

  release:
    needs: [build-frontend, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MSSQL Dashboard v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## MSSQL Dashboard v${{ steps.version.outputs.VERSION }}

            Free self-hosted SQL Server monitoring dashboard by Anchored Tech Solutions.

            ### 🖥️ Desktop App (NEW in v1.1.0)
            Download the Windows installer for a native desktop experience with system tray support.

            ### ⬇️ Downloads

            | Package | Platform | Description |
            |---|---|---|
            | `MSSQL-Dashboard-Setup-*.exe` | Windows 10/11 | **Recommended** — full installer with shortcuts |
            | `MSSQL-Dashboard-*.exe` | Windows 10/11 | Portable — no install needed, just run |
            | `mssql-dashboard-*.zip` | All platforms | Source code + manual install |

            ### Requirements
            - Windows 10 or 11 (64-bit)
            - Python 3.11+ → https://python.org
            - ODBC Driver 17 or 18 → https://aka.ms/odbc18

            ### What's New
            - Native desktop app with system tray
            - Auto-starts Python backend on launch
            - Minimize to tray — keep monitoring in background
            - Desktop notifications for critical alerts
            - Auto-update support
            - React frontend with live charts

            ---
            Built by [Anchored Tech Solutions](https://anchoredtechsolutions.com)
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.zip
