name: CI

# Run on every push to main and on all pull requests
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: installer/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r installer/requirements.txt

      - name: Validate core modules import
        working-directory: backend
        run: |
          python -c "
          from database import init_db, MonitoredServer, AuthType, ServerRole
          from crypto import encrypt, decrypt
          from connections.builder import build_connection_string

          # Init DB
          init_db()
          print('OK: database init')

          # Crypto round-trip
          token = encrypt('TestPassword123!')
          assert decrypt(token) == 'TestPassword123!'
          print('OK: crypto encrypt/decrypt')

          # Connection string builder - SQL Auth
          from database import SessionLocal
          srv = MonitoredServer(
              id=1, display_name='Test', host='SQLSERVER01', port=1433,
              auth_type=AuthType.sql,
              username=encrypt('sa'), password=encrypt('pass'),
              encrypt=False, trust_cert=True,
              role=ServerRole.standalone, enabled=True, poll_interval=60
          )
          cs = build_connection_string(srv)
          assert 'UID=sa' in cs
          print('OK: SQL Auth connection string')

          # Windows Auth
          srv2 = MonitoredServer(
              id=2, display_name='Win', host='CLUSTER01', port=1433,
              auth_type=AuthType.windows, encrypt=False, trust_cert=True,
              role=ServerRole.fci, enabled=True, poll_interval=60
          )
          cs2 = build_connection_string(srv2)
          assert 'Trusted_Connection=yes' in cs2
          print('OK: Windows Auth connection string')

          # TLS/Cert Auth
          srv3 = MonitoredServer(
              id=3, display_name='TLS', host='mydb.rds.amazonaws.com', port=1433,
              auth_type=AuthType.tls_cert,
              username=encrypt('admin'), password=encrypt('secret'),
              encrypt=True, trust_cert=False,
              role=ServerRole.standalone, enabled=True, poll_interval=60
          )
          cs3 = build_connection_string(srv3)
          assert 'Encrypt=yes' in cs3
          assert 'TrustServerCertificate=no' in cs3
          print('OK: TLS/Cert connection string')

          print()
          print('All checks passed.')
          "

      - name: Validate FastAPI app loads
        working-directory: backend
        run: |
          python -c "
          # Just import the app to catch any syntax/import errors
          # Can't fully start it without MSSQL, but we can validate it loads
          import sys
          sys.path.insert(0, '.')
          from database import init_db
          init_db()
          print('OK: FastAPI app imports successfully')
          "
